<svg width="460" height="440" viewBox="0 0 460 440" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','Consolas',monospace">
  <defs>
    <radialGradient id="fillGrad" cx="50%" cy="48%" r="65%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#238636" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="460" height="440" rx="16" fill="#0d1117" stroke="#30363d"/>

  <!-- grid rings -->
  <g stroke="#30363d" stroke-width="1" fill="none">
    <polygon points="230,190 256,205 256,235 230,250 204,235 204,205"/>
    <polygon points="230,160 282,190 282,250 230,280 178,250 178,190"/>
    <polygon points="230,130 307.9,175 307.9,265 230,310 152.1,265 152.1,175"/>
    <polygon points="230,100 333.9,160 333.9,280 230,340 126.1,280 126.1,160"/>
    <polygon points="230,70 359.9,145 359.9,295 230,370 100.1,295 100.1,145"/>
  </g>

  <!-- axis lines -->
  <g stroke="#30363d" stroke-width="1">
    <line x1="230" y1="220" x2="230" y2="70"/>
    <line x1="230" y1="220" x2="359.9" y2="145"/>
    <line x1="230" y1="220" x2="359.9" y2="295"/>
    <line x1="230" y1="220" x2="230" y2="370"/>
    <line x1="230" y1="220" x2="100.1" y2="295"/>
    <line x1="230" y1="220" x2="100.1" y2="145"/>
  </g>

  <!-- data polygon, draws in via stroke-dasharray -->
  <polygon points="230,82 331.3,161.5 344.3,286 230,343 149.5,266.5 109.2,150.2"
           fill="url(#fillGrad)" stroke="#58a6ff" stroke-width="2.5"
           filter="url(#softGlow)" stroke-dasharray="620" stroke-dashoffset="620">
    <animate attributeName="stroke-dashoffset" from="620" to="0" begin="0.2s" dur="1.6s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.1s" fill="freeze"/>
  </polygon>

  <!-- vertex dots, pulsing -->
  <g fill="#79c0ff">
    <circle cx="230" cy="82" r="4"><animate attributeName="r" values="4;6;4" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="331.3" cy="161.5" r="4"><animate attributeName="r" values="4;6;4" dur="2.4s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="344.3" cy="286" r="4"><animate attributeName="r" values="4;6;4" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="343" r="4"><animate attributeName="r" values="4;6;4" dur="2.4s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="149.5" cy="266.5" r="4"><animate attributeName="r" values="4;6;4" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="109.2" cy="150.2" r="4"><animate attributeName="r" values="4;6;4" dur="2.4s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- axis labels -->
  <g fill="#8b949e" font-size="13" text-anchor="middle">
    <text x="230" y="34">Backend · 92%</text>
    <text x="410" y="126">Frontend · 78%</text>
    <text x="410" y="316">AI / ML · 88%</text>
    <text x="230" y="398">Databases · 82%</text>
    <text x="50" y="316" text-anchor="middle">DevOps · 62%</text>
    <text x="50" y="126" text-anchor="middle">Problem Solving · 93%</text>
  </g>

  <text x="230" y="420" fill="#3fb950" font-size="12" text-anchor="middle">// skill.radar --live --profile=sujalkarawade</text>
</svg>
